services:
  tsp:
    image: viibeware/trusted-servants-pro:latest
    container_name: tspro
    ports:
      - "8090:8000"
    volumes:
      - ./data:/data
      - /proc:/host/proc:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /etc/hostname:/host/etc/hostname:ro
    environment:
      - TSP_SECRET_KEY=${TSP_SECRET_KEY:?TSP_SECRET_KEY must be set in .env}
      - TSP_ADMIN_USERNAME=${TSP_ADMIN_USERNAME:-admin}
      - TSP_ADMIN_PASSWORD=${TSP_ADMIN_PASSWORD:?TSP_ADMIN_PASSWORD must be set in .env (used only on first boot to seed the admin account)}
      - TSP_ADMIN_EMAIL=${TSP_ADMIN_EMAIL:-admin@example.com}
      - TSP_HOST_PROC=/host/proc
      - TSP_HOST_ETC=/host/etc
    restart: unless-stopped
    # Cap container logs so an unattended box can't fill its disk with
    # JSON log files over time (default json-file driver is unbounded).
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Daily image-prune janitor — an independent safety net for disk growth.
  # Removes everything unused for >72h, catching images orphaned by manual
  # `docker compose pull`, :latest churn, or partial pulls (which Watchtower's
  # own cleanup never touches). NOTE: prune is host-wide; this is intended for
  # a dedicated TSP host, not a shared box running other stacks.
  docker-prune:
    image: docker:cli
    container_name: tspro-prune
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          docker image prune -af --filter "until=72h" || true
          docker builder prune -af --filter "until=72h" || true
          sleep 86400
        done
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
