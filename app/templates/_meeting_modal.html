{# Reusable meeting create/edit modal. #}
{% set form_id = modal_id ~ '-form' %}

{# One row of the Extended Content editor — optional title input plus
   a Markdown-supported body textarea. Field names are scoped by
   `idx`; the JS clones the hidden <template> below the editor and
   swaps `__INDEX__` for a fresh integer. The save endpoint walks
   `ext_block_present` markers in submission order. #}
{% macro _ext_block_row(idx, block) %}
<div class="fe-meeting-extended-card" data-extended-item data-item-index="{{ idx }}">
  <input type="hidden" name="ext_block_present" value="{{ idx }}">
  <div class="fe-meeting-extended-card-fields">
    <input type="text"
           name="ext_block_{{ idx }}_title"
           value="{{ (block.title if block else '') or '' }}"
           placeholder="Block title (optional)">
    <textarea name="ext_block_{{ idx }}_body"
              rows="5"
              placeholder="Markdown supported. Use ## headings, **bold**, *italic*, [links](https://...), - lists, etc.">{{ (block.body if block else '') or '' }}</textarea>
  </div>
  <button type="button" class="fe-meeting-extended-card-remove" data-extended-remove
          title="Remove block" aria-label="Remove block">{{ icon('trash') }}</button>
</div>
{% endmacro %}
<div class="modal modal-lg" id="{{ modal_id }}" aria-hidden="true">
  <div class="modal-backdrop" data-close></div>
  <div class="modal-panel" role="dialog" aria-modal="true">
    <div class="modal-head">
      <h2>{{ "Edit Meeting" if meeting else "New Meeting" }}</h2>
      <button type="button" class="icon-btn" data-close aria-label="Close">{{ icon('x') }}</button>
    </div>
    <div class="modal-body">
      <form id="{{ form_id }}" method="post" action="{{ form_action }}" class="form"
            enctype="multipart/form-data" data-meeting-form>
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label>Name
          <input name="name" required value="{{ meeting.name if meeting else '' }}">
        </label>

        {% if current_user.is_authenticated and current_user.can_edit_frontend() %}
        <label>Public URL
          <span class="muted small" style="display:block; margin: 2px 0 4px;">
            Only the slug after <code>/meetings/</code> is editable. Leave blank to derive automatically from the name. Lowercase letters, numbers, and hyphens only.
          </span>
          <div class="slug-input-row">
            <span class="slug-input-prefix" aria-hidden="true">/meetings/</span>
            <input name="slug" type="text" class="slug-input-field"
                   value="{{ meeting.slug if (meeting and meeting.slug) else '' }}"
                   placeholder="{{ meeting.public_slug if meeting else 'auto-derived from name' }}"
                   pattern="[a-z0-9\-]*" maxlength="200">
          </div>
        </label>

        {% if meeting %}
        {% include "_slug_history.html" %}
        {% endif %}
        {% endif %}

        {% set mtype = meeting.meeting_type if meeting else 'in_person' %}
        <fieldset class="fieldset">
          <legend>Meeting Type</legend>
          <div class="radio-row">
            {% for val, lbl in [('in_person','In-Person'),('online','Online'),('hybrid','Hybrid')] %}
            <label class="radio">
              <input type="radio" name="meeting_type" value="{{ val }}"
                     {% if mtype == val %}checked{% endif %}
                     class="meeting-type-radio">
              <span>{{ lbl }}</span>
            </label>
            {% endfor %}
          </div>
        </fieldset>

        <label>Location
          {% set chosen = meeting.location if meeting else '' %}
          {% set is_preset = chosen and locations|selectattr('name','equalto',chosen)|list %}
          <select name="location_choice" class="location-select">
            <option value="">— None —</option>
            {% for l in locations %}
            <option value="{{ l.name }}" {% if chosen == l.name %}selected{% endif %}>{{ l.name }}</option>
            {% endfor %}
            <option value="__custom__" {% if chosen and not is_preset %}selected{% endif %}>Custom…</option>
          </select>
        </label>
        <label class="location-custom-wrap" {% if not (chosen and not is_preset) %}style="display:none"{% endif %}>
          Custom Location
          <input name="location_custom" class="location-custom"
                 value="{% if chosen and not is_preset %}{{ chosen }}{% endif %}">
        </label>

        <label>Location notes <span class="muted smaller">(optional, admin-only)</span>
          <span class="muted small" style="display:block; margin: 2px 0 4px;">Anything visitors or hosts should know about getting in / where to park / who to ask. Plain text.</span>
          <textarea name="location_notes" rows="2" placeholder="e.g. Side entrance off Main St. Ring buzzer #4. Free street parking after 6pm.">{{ (meeting.location_notes if meeting else '') or '' }}</textarea>
        </label>

        <label>Description <span class="muted smaller">— Markdown supported</span>
          <div class="md-editor" data-md-editor>
            <textarea name="description" rows="6" data-md-input
                      class="md-editor-input"
                      placeholder="Write a description… **bold**, *italic*, [links](https://example.com), - bulleted lists, etc.">{{ (meeting.description if meeting else '') or '' }}</textarea>
            <div class="md-editor-preview" data-md-preview aria-live="polite">
              <span class="md-editor-preview-empty muted small">Preview appears here as you type.</span>
            </div>
          </div>
        </label>

        <label>Backend Alert Message <span class="muted smaller">(leave blank to hide)</span>
          <span class="muted small" style="display:block; margin: 2px 0 4px;">Only appears in the tspro backend — visible to logged-in users on the meeting detail page.</span>
          <textarea name="alert_message" rows="2" placeholder="Internal note for users.">{{ (meeting.alert_message if meeting else '') or '' }}</textarea>
        </label>

        <label>Public Alert Message <span class="muted smaller">(leave blank to hide)</span>
          <span class="muted small" style="display:block; margin: 2px 0 4px;">Displayed prominently on the public meeting detail page.</span>
          <textarea name="public_alert_message" rows="2" placeholder="Notice for the public, e.g. cancellation, change of venue.">{{ (meeting.public_alert_message if meeting else '') or '' }}</textarea>
        </label>
        {# Optional auto-expiration for the public alert. When the
           toggle is on, the alert is hidden from the public site
           after the chosen datetime AND the message + expiry are
           cleared from the DB on the next page load past that
           cutoff (see ``_expire_meeting_alerts``). Stored as a naive
           site-local datetime, same convention as other admin-typed
           timestamps. #}
        {%- set _alert_expiry = meeting.public_alert_expires_at if meeting else none -%}
        <div class="public-alert-expiry" data-public-alert-expiry>
          <label class="mode-toggle public-alert-expiry-toggle">
            <input type="checkbox"
                   name="public_alert_expires_enabled"
                   value="1"
                   {% if _alert_expiry %}checked{% endif %}
                   data-public-alert-expiry-toggle>
            <span class="mode-track"><span class="mode-thumb"></span></span>
            <span class="muted smaller">Auto-hide this alert after a specific date &amp; time</span>
          </label>
          <div class="public-alert-expiry-field"
               data-public-alert-expiry-field
               {% if not _alert_expiry %}hidden{% endif %}>
            <label class="public-alert-expiry-input">
              <span class="muted smaller">Expires on</span>
              <input type="datetime-local"
                     name="public_alert_expires_at"
                     value="{% if _alert_expiry %}{{ _alert_expiry.strftime('%Y-%m-%dT%H:%M') }}{% endif %}"
                     data-public-alert-expiry-input>
            </label>
            <p class="muted smaller public-alert-expiry-help">
              Times are in the site timezone{% if site and site.timezone %} ({{ site.timezone }}){% endif %}. After this moment the message is hidden from the public site and removed from this field automatically.
            </p>
          </div>
        </div>

        {# Extended-content section — admin-tunable Markdown blocks
           rendered on the public meeting detail page below the schedule
           / zoom / files cards. Toggle gates the whole section so
           admins can park draft content without exposing it; the
           per-block list lets them stack as many blocks as they need. #}
        <fieldset class="fieldset fe-meeting-extended-fieldset">
          <legend>Extended Content</legend>
          {%- set _ext_enabled = meeting.extended_content_enabled if meeting else false -%}
          {%- set _ext_blocks = meeting.extended_blocks() if meeting else [] -%}
          <label class="mode-toggle fe-meeting-extended-toggle">
            <input type="checkbox" name="extended_content_enabled" value="1"
                   {% if _ext_enabled %}checked{% endif %}
                   data-extended-toggle>
            <span class="mode-track"><span class="mode-thumb"></span></span>
            <span class="muted smaller">Show extended content on the public meeting page</span>
          </label>
          <div class="fe-meeting-extended-editor"
               data-extended-editor
               {% if not _ext_enabled %}aria-hidden="true"{% endif %}>
            <div class="fe-meeting-extended-list" data-extended-list>
              {% for blk in _ext_blocks %}
                {{ _ext_block_row(loop.index0, blk) }}
              {% endfor %}
            </div>
            <template data-extended-template>
              {{ _ext_block_row('__INDEX__', None) }}
            </template>
            <button type="button" class="btn btn-sm" data-extended-add>
              {{ icon('plus') }} <span>Add block</span>
            </button>
          </div>
        </fieldset>

        <label>Logo
          {% if meeting and meeting.logo_filename %}
          <div class="logo-current">
            <img src="{{ url_for('main.meeting_logo', mid=meeting.id) }}" alt="">
            <label class="check"><input type="checkbox" name="remove_logo" value="1"> Remove</label>
          </div>
          {% endif %}
          <input type="file" name="logo" accept="image/*">
        </label>

        <fieldset class="fieldset">
          <legend>Days &amp; Times</legend>
          <div class="day-list">
            <div class="day-row day-row-head">
              <span class="day-col-label">Day</span>
              <span class="day-col-label">Start</span>
              <span class="day-col-label">End</span>
              <span class="day-col-label zoom-only-field">Opens</span>
            </div>
            {% for d in DAYS_OF_WEEK %}
              {% set idx = loop.index0 %}
              {% set ns = namespace(sched=None) %}
              {% if meeting %}
                {% for s in meeting.schedules %}{% if s.day_of_week == idx %}{% set ns.sched = s %}{% endif %}{% endfor %}
              {% endif %}
              {% set sched = ns.sched %}
              <div class="day-row {% if sched %}on{% endif %}">
                <label class="mode-toggle day-check">
                  <input type="checkbox" class="day-toggle"
                         {% if sched %}checked{% endif %}
                         data-day="{{ idx }}">
                  <span class="mode-track"><span class="mode-thumb"></span></span>
                  <span class="day-label">{{ d }}</span>
                </label>
                <input type="hidden" class="day-hidden" name="schedule_day"
                       value="{{ idx }}" {% if not sched %}disabled{% endif %}>
                <input type="time" class="day-field" name="schedule_time"
                       value="{{ sched.start_time if sched else '' }}"
                       title="Start time"
                       {% if not sched %}disabled{% endif %}>
                <input type="time" class="day-field" name="schedule_end"
                       value="{{ sched.end_time if sched else '' }}"
                       title="End time"
                       {% if not sched %}disabled{% endif %}>
                <input type="time" class="day-field zoom-only-field" name="schedule_opens"
                       value="{{ sched.opens_time if sched and sched.opens_time else '' }}"
                       title="Zoom opens at"
                       placeholder="Opens"
                       {% if not sched %}disabled{% endif %}>
              </div>
            {% endfor %}
          </div>
        </fieldset>

        {% if meeting %}
        {# Scheduled future schedule swaps. Lives visually inside the
           Day & Times area so admins see queued changes in context,
           but every interactive element (cancel buttons + the
           "Schedule a future change" form fields) is bound via the
           HTML5 ``form="…"`` attribute to forms rendered AFTER the
           main edit form's </form>. That sidesteps HTML's "no nested
           forms" rule while keeping the UI where it belongs. #}
        {%- set _sched_chg_new_form_id = "meeting-sched-chg-new-" ~ meeting.id -%}
        <fieldset class="fieldset schedule-change-fieldset">
          <legend>Scheduled changes</legend>
          <p class="muted small schedule-change-blurb">
            Set up a future schedule swap and forget about it. The new
            days and times automatically replace the current ones on
            the date you pick — nothing to remember to do later.
          </p>
          {% set _changes = meeting.schedule_changes %}
          {% if _changes %}
          <ul class="schedule-change-list">
            {% for chg in _changes %}
            {%- set _entries = chg.schedules_json|from_json -%}
            {%- set _cancel_form_id = "meeting-sched-chg-cancel-" ~ chg.id -%}
            <li class="schedule-change-item">
              <div class="schedule-change-head">
                <div>
                  <div class="schedule-change-when">
                    Effective <strong>{{ chg.effective_date.strftime('%A, %B %-d, %Y') }}</strong>
                  </div>
                  {% if chg.note %}
                  <div class="muted small schedule-change-note">{{ chg.note }}</div>
                  {% endif %}
                </div>
                <button type="submit" form="{{ _cancel_form_id }}"
                        class="btn btn-sm"
                        onclick="return confirm('Cancel this scheduled change? The meeting will keep its current days and times.');">
                  {{ icon('x') }} Cancel
                </button>
              </div>
              {% if _entries %}
              <ul class="schedule-change-entries muted small">
                {% for e in _entries %}
                {%- set _day_idx = e.day if e.day is defined else -1 -%}
                <li>
                  {% if 0 <= _day_idx < 7 %}{{ DAYS_OF_WEEK[_day_idx] }}{% else %}?{% endif %}
                  · {{ (e.start_time or '?')|fmt12h }}
                  {% if e.duration %}<span class="muted smaller">· {{ e.duration }} min</span>{% endif %}
                  {% if e.opens_time %}<span class="muted smaller">· opens {{ e.opens_time|fmt12h }}</span>{% endif %}
                </li>
                {% endfor %}
              </ul>
              {% else %}
              <p class="muted smaller">No days defined for this change — it will clear the schedule on the effective date.</p>
              {% endif %}
            </li>
            {% endfor %}
          </ul>
          {% endif %}

          <details class="schedule-change-add">
            <summary>{{ icon('plus') }} Schedule a future change</summary>
            {# Inputs below are bound to the outer form rendered after
               the main </form> tag via the ``form`` attribute. The
               outer form just carries the csrf + submit button. #}
            <div class="schedule-change-form">
              <div class="schedule-change-form-row">
                <label>Effective date
                  <input type="date" name="change_effective_date"
                         form="{{ _sched_chg_new_form_id }}" required>
                </label>
                <label class="schedule-change-form-note">Optional note
                  <input type="text" name="change_note" maxlength="500"
                         form="{{ _sched_chg_new_form_id }}"
                         placeholder="e.g. Summer schedule — earlier start.">
                </label>
              </div>
              <div class="day-list day-list-change">
                <div class="day-row day-row-head">
                  <span class="day-col-label">Day</span>
                  <span class="day-col-label">Start</span>
                  <span class="day-col-label">End</span>
                  <span class="day-col-label zoom-only-field">Opens</span>
                </div>
                {% for d in DAYS_OF_WEEK %}
                  {% set idx = loop.index0 %}
                  <div class="day-row">
                    <label class="mode-toggle day-check">
                      <input type="checkbox" class="day-toggle"
                             data-day="{{ idx }}">
                      <span class="mode-track"><span class="mode-thumb"></span></span>
                      <span class="day-label">{{ d }}</span>
                    </label>
                    <input type="hidden" class="day-hidden" name="change_schedule_day"
                           form="{{ _sched_chg_new_form_id }}"
                           value="{{ idx }}" disabled>
                    <input type="time" class="day-field" name="change_schedule_time"
                           form="{{ _sched_chg_new_form_id }}"
                           title="Start time" disabled>
                    <input type="time" class="day-field" name="change_schedule_end"
                           form="{{ _sched_chg_new_form_id }}"
                           title="End time" disabled>
                    <input type="time" class="day-field zoom-only-field" name="change_schedule_opens"
                           form="{{ _sched_chg_new_form_id }}"
                           title="Zoom opens at" placeholder="Opens" disabled>
                  </div>
                {% endfor %}
              </div>
              <div class="form-actions">
                <button type="submit" form="{{ _sched_chg_new_form_id }}" class="btn btn-primary">
                  Queue schedule change
                </button>
              </div>
            </div>
          </details>
        </fieldset>
        {% endif %}

        {# ── Video conferencing — one fieldset per platform. Each has an
           enable toggle; when off, the fields collapse to just the toggle
           row (data-conf-fields hidden) and the platform renders nowhere
           on the public site. The whole group is zoom-only so it hides for
           in-person meetings. #}
        <fieldset class="fieldset zoom-only conf-fieldset">
          <legend>Zoom</legend>
          {% set _zoom_on = meeting.zoom_enabled if meeting else True %}
          <label class="mode-toggle conf-enable-toggle">
            <input type="checkbox" name="zoom_enabled" value="1" data-conf-toggle {% if _zoom_on %}checked{% endif %}>
            <span class="mode-track"><span class="mode-thumb"></span></span>
            <span>Enable Zoom for this meeting</span>
          </label>
          <div class="conf-fields" data-conf-fields>
            <label>Zoom Account
              <select name="zoom_account_id">
                <option value="">— None —</option>
                {% for a in zoom_accounts %}
                <option value="{{ a.id }}"
                        {% if meeting and meeting.zoom_account_id == a.id %}selected{% endif %}>
                  {{ a.name }}
                </option>
                {% endfor %}
              </select>
            </label>
            <div class="row">
              <label>Meeting ID
                <input name="zoom_meeting_id"
                       value="{{ meeting.zoom_meeting_id if meeting else '' }}">
              </label>
              <label>Passcode
                <input name="zoom_passcode"
                       value="{{ meeting.zoom_passcode if meeting else '' }}">
              </label>
            </div>
            <label>Meeting Link URL
              <input name="zoom_link" type="url" placeholder="https://zoom.us/j/..."
                     value="{{ meeting.zoom_link if meeting and meeting.zoom_link else '' }}">
            </label>
            {% set _show_otp = meeting.show_otp if meeting else True %}
            <label class="mode-toggle otp-toggle">
              <input type="checkbox" name="show_otp" value="1" {% if _show_otp %}checked{% endif %}>
              <span class="mode-track"><span class="mode-thumb"></span></span>
              <span>Show OTP Codes section on meeting page</span>
            </label>
          </div>
        </fieldset>

        <fieldset class="fieldset zoom-only conf-fieldset">
          <legend>Google Meet</legend>
          {% set _gmeet_on = meeting.gmeet_enabled if meeting else False %}
          <label class="mode-toggle conf-enable-toggle">
            <input type="checkbox" name="gmeet_enabled" value="1" data-conf-toggle {% if _gmeet_on %}checked{% endif %}>
            <span class="mode-track"><span class="mode-thumb"></span></span>
            <span>Enable Google Meet for this meeting</span>
          </label>
          <div class="conf-fields" data-conf-fields>
            <div class="row">
              <label>Meeting ID
                <input name="gmeet_meeting_id"
                       value="{{ meeting.gmeet_meeting_id if meeting else '' }}">
              </label>
              <label>Passcode
                <input name="gmeet_passcode"
                       value="{{ meeting.gmeet_passcode if meeting else '' }}">
              </label>
            </div>
            <label>Meeting Link URL
              <input name="gmeet_link" type="url" placeholder="https://meet.google.com/..."
                     value="{{ meeting.gmeet_link if meeting and meeting.gmeet_link else '' }}">
            </label>
          </div>
        </fieldset>

        <fieldset class="fieldset zoom-only conf-fieldset">
          <legend>Microsoft Teams</legend>
          {% set _teams_on = meeting.teams_enabled if meeting else False %}
          <label class="mode-toggle conf-enable-toggle">
            <input type="checkbox" name="teams_enabled" value="1" data-conf-toggle {% if _teams_on %}checked{% endif %}>
            <span class="mode-track"><span class="mode-thumb"></span></span>
            <span>Enable Microsoft Teams for this meeting</span>
          </label>
          <div class="conf-fields" data-conf-fields>
            <div class="row">
              <label>Meeting ID
                <input name="teams_meeting_id"
                       value="{{ meeting.teams_meeting_id if meeting else '' }}">
              </label>
              <label>Passcode
                <input name="teams_passcode"
                       value="{{ meeting.teams_passcode if meeting else '' }}">
              </label>
            </div>
            <label>Meeting Link URL
              <input name="teams_link" type="url" placeholder="https://teams.microsoft.com/l/..."
                     value="{{ meeting.teams_link if meeting and meeting.teams_link else '' }}">
            </label>
          </div>
        </fieldset>

        {% if all_libraries is defined %}
        <fieldset class="fieldset">
          <legend>Libraries</legend>
          {% if all_libraries %}
          {%- set _module_on = site and site.frontend_module_enabled -%}
          {%- set _can_public = current_user.is_authenticated and current_user.can_edit_frontend() -%}
          <div class="library-picker">
            {% set _public_reading_ids = (meeting.public_library_items|map(attribute='id')|list) if meeting else [] %}
            {% for lib in all_libraries %}
              {% set included = meeting and lib in meeting.libraries %}
              {% set mode = meeting.library_mode(lib) if included else 'all' %}
              {% set sel_ids = meeting.selected_ids_for_library(lib) if (included and meeting) else [] %}
              {% set whole_public = meeting.public_library_visible(lib) if (included and meeting) else false %}
              <div class="library-row" data-lib="{{ lib.id }}">
                <div class="library-head-wrap">
                  <label class="library-head">
                    <input type="checkbox" name="library_ids" value="{{ lib.id }}"
                           class="library-include" {% if included %}checked{% endif %}>
                    <span class="library-name">{{ lib.name }}</span>
                    <span class="muted smaller">{{ lib.items.count() }} files</span>
                  </label>
                  {# Whole-library Public toggle — same chrome as the Files
                     row toggle. Only meaningful when mode='all' (granular
                     mode uses the per-item toggles below); JS hides it
                     when the row flips to granular. #}
                  {% if _module_on %}
                  <label class="mode-toggle file-public-row-toggle library-public-toggle{% if not _can_public %} is-disabled{% endif %}"
                         data-library-public-toggle
                         title="{{ 'Show this library on the public meeting page' if _can_public else 'Only admins and frontend editors can change public visibility' }}">
                    <input type="checkbox" name="library_public_{{ lib.id }}" value="1"
                           {% if whole_public %}checked{% endif %}
                           {% if not _can_public %}disabled aria-disabled="true"{% endif %}>
                    <span class="mode-track"><span class="mode-thumb"></span></span>
                    <span class="muted smaller">Public</span>
                  </label>
                  {% endif %}
                </div>
                <div class="library-detail" {% if not included %}style="display:none"{% endif %}>
                  <label class="mode-toggle">
                    <span class="mode-label-all">All files</span>
                    <input type="checkbox" name="library_mode_{{ lib.id }}" value="granular"
                           class="library-mode-switch" {% if mode == 'granular' %}checked{% endif %}>
                    <span class="mode-track"><span class="mode-thumb"></span></span>
                    <span class="mode-label-granular">Granular</span>
                  </label>
                  {# Per-item include + public toggles. The include
                     checkbox decides whether the item is part of the
                     meeting's library scope; the public toggle (only
                     visible in granular mode) controls whether it
                     surfaces on the public meeting page. #}
                  <div class="library-readings" {% if mode != 'granular' %}style="display:none"{% endif %}>
                    {% for r in lib.items %}
                    <div class="reading-row">
                      <label class="reading-check">
                        <input type="checkbox" name="library_readings_{{ lib.id }}" value="{{ r.id }}"
                               {% if r.id in sel_ids %}checked{% endif %}>
                        <span>{{ r.title }}</span>
                      </label>
                      {% if _module_on %}
                      <label class="mode-toggle file-public-row-toggle reading-public-toggle{% if not _can_public %} is-disabled{% endif %}"
                             title="{{ 'Show this reading on the public meeting page' if _can_public else 'Only admins and frontend editors can change public visibility' }}">
                        <input type="checkbox" name="library_public_library_items_{{ lib.id }}" value="{{ r.id }}"
                               {% if r.id in _public_reading_ids %}checked{% endif %}
                               {% if not _can_public %}disabled aria-disabled="true"{% endif %}>
                        <span class="mode-track"><span class="mode-thumb"></span></span>
                        <span class="muted smaller">Public</span>
                      </label>
                      {% endif %}
                    </div>
                    {% else %}
                    <p class="muted small">No files in this library yet.</p>
                    {% endfor %}
                  </div>
                </div>
              </div>
            {% endfor %}
          </div>
          {% else %}
          <p class="muted small">No libraries available yet.</p>
          {% endif %}
        </fieldset>
        {% endif %}
      </form>

      {% if meeting %}
      {# Bare host forms for the in-place "Scheduled changes" UI that
         lives visually inside the schedule fieldset above. The inputs
         and submit buttons up there are tied to these forms via the
         HTML5 ``form="…"`` attribute — sidesteps the "no nested
         forms" rule without making the operator hunt for the section
         at the bottom of the modal. #}
      <form id="meeting-sched-chg-new-{{ meeting.id }}" method="post"
            action="{{ url_for('main.meeting_schedule_change_new', slug=meeting.public_slug) }}"
            hidden>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      </form>
      {% for chg in meeting.schedule_changes %}
      <form id="meeting-sched-chg-cancel-{{ chg.id }}" method="post"
            action="{{ url_for('main.meeting_schedule_change_delete', slug=meeting.public_slug, cid=chg.id) }}"
            hidden>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      </form>
      {% endfor %}

      <fieldset class="fieldset">
        <legend>Files</legend>
        {% for cat in FILE_CATEGORIES %}
        <div class="file-cat">
          <div class="card-head"><h3 class="file-cat-title">{{ CATEGORY_LABELS[cat] }}</h3>
            <button type="button" class="btn btn-sm" data-file-add-toggle="add-{{ cat }}">+ Add</button>
          </div>
          {% set items = meeting.files_by_category(cat) %}
          {% if items %}
          <ul class="file-list file-list-sortable"
              data-reorder-url="{{ url_for('main.meeting_files_reorder', slug=meeting.public_slug) }}"
              data-reorder-category="{{ cat }}">
            {% for f in items %}
            {% set f_edit_id = 'edit-file-' ~ f.id %}
            <li data-item-id="{{ f.id }}" draggable="true">
              <span class="drag-handle" aria-hidden="true">{{ icon('grip-vertical') }}</span>
              <div class="file-main">
                <a href="{{ url_for('main.file_view', fid=f.id) }}" target="_blank" rel="noopener">{{ f.title }}</a>
                {% if f.original_filename %}<div class="muted smaller">{{ f.original_filename }}</div>{% endif %}
              </div>
              <div class="row-actions">
                {% set _module_on = site and site.frontend_module_enabled %}
                {% set _can_public = current_user.is_authenticated and current_user.can_edit_frontend() %}
                {% if _module_on %}
                <label class="mode-toggle file-public-row-toggle{% if not _can_public %} is-disabled{% endif %}"
                       title="{{ 'Show this ' + (CATEGORY_LABELS[cat]|lower|trim('s')) + ' on the public meeting page' if _can_public else 'Only admins and frontend editors can change public visibility' }}">
                  <input type="checkbox" data-file-public-toggle="{{ f.id }}" value="1"
                         {% if f.public_visible %}checked{% endif %}
                         {% if not _can_public %}disabled aria-disabled="true"{% endif %}>
                  <span class="mode-track"><span class="mode-thumb"></span></span>
                  <span class="muted smaller">Public</span>
                </label>
                {% endif %}
                <button type="button" class="btn btn-sm" data-file-add-toggle="{{ f_edit_id }}">Edit</button>
                <form method="post" action="{{ url_for('main.file_delete', fid=f.id) }}" onsubmit="return confirm('Delete this file?');">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                  <button class="btn btn-sm btn-danger">{{ icon('x') }}</button>
                </form>
              </div>
              <form id="{{ f_edit_id }}" method="post" class="file-add-form collapsed" enctype="multipart/form-data"
                    action="{{ url_for('main.file_edit', fid=f.id) }}"
                    data-inline-save>
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <label>Title<input name="title" required value="{{ f.title }}"></label>
                <label>Description<textarea name="description" rows="2">{{ f.description or '' }}</textarea></label>
                {% if cat in ('external_links', 'videos') %}
                <label>URL<input name="url" type="url" required placeholder="https://..."
                       value="{{ f.url or '' }}"></label>
                {% else %}
                {% if f.original_filename %}
                <div class="logo-current">
                  <span class="muted small">{{ f.original_filename }}</span>
                </div>
                {% endif %}
                <label>Replace File</label>
                <div class="file-input-row">
                  <input type="file" name="file">
                  <button type="button" class="btn btn-sm" data-media-picker="{{ f_edit_id }}">File Browser</button>
                </div>
                <label>Or URL<input name="url" type="url" placeholder="https://..."
                       value="{{ f.url or '' }}"></label>
                {% endif %}
                {% if _module_on %}
                <label class="mode-toggle file-public-toggle{% if not _can_public %} is-disabled{% endif %}"
                       {% if not _can_public %}title="Only admins and frontend editors can change public visibility"{% endif %}>
                  <input type="checkbox" name="public_visible" value="1" {% if f.public_visible %}checked{% endif %}
                         {% if not _can_public %}disabled aria-disabled="true"{% endif %}>
                  <span class="mode-track"><span class="mode-thumb"></span></span>
                  <span>Show on public meeting page</span>
                </label>
                {% endif %}
                <div class="form-actions">
                  <button type="button" class="btn btn-sm" data-file-add-cancel="{{ f_edit_id }}">Cancel</button>
                  <button type="submit" class="btn btn-sm btn-primary">Save</button>
                </div>
              </form>
            </li>
            {% endfor %}
          </ul>
          {% else %}
          <p class="muted small">No {{ CATEGORY_LABELS[cat]|lower }} yet.</p>
          {% endif %}
          <form id="add-{{ cat }}" method="post" class="file-add-form collapsed" enctype="multipart/form-data"
                action="{{ url_for('main.file_new', slug=meeting.public_slug, category=cat) }}">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label>Title<input name="title" required></label>
            <label>Description<textarea name="description" rows="2"></textarea></label>
            {% if cat in ('external_links', 'videos') %}
            <label>URL<input name="url" type="url" required placeholder="https://..."></label>
            {% else %}
            <label>File</label>
            <div class="file-input-row">
              <input type="file" name="file">
              <button type="button" class="btn btn-sm" data-media-picker="add-{{ cat }}">File Browser</button>
            </div>
            <label>Or URL<input name="url" type="url" placeholder="https://..."></label>
            {% endif %}
            {% if site and site.frontend_module_enabled %}
            {% set _can_public_new = current_user.is_authenticated and current_user.can_edit_frontend() %}
            <label class="mode-toggle file-public-toggle{% if not _can_public_new %} is-disabled{% endif %}"
                   {% if not _can_public_new %}title="Only admins and frontend editors can change public visibility"{% endif %}>
              <input type="checkbox" name="public_visible" value="1"
                     {% if not _can_public_new %}disabled aria-disabled="true"{% endif %}>
              <span class="mode-track"><span class="mode-thumb"></span></span>
              <span>Show on public meeting page</span>
            </label>
            {% endif %}
            <div class="form-actions">
              <button type="button" class="btn btn-sm" data-file-add-cancel="add-{{ cat }}">Cancel</button>
              <button type="submit" class="btn btn-sm btn-primary">Upload</button>
            </div>
          </form>
        </div>
        {% endfor %}
      </fieldset>
      {% endif %}
    </div>
    <div class="modal-foot">
      <button type="button" class="btn" data-close>Cancel</button>
      {# Yellow save bar replaces the static "Save" button — only
         appears when the form has unsaved edits. Native submit via
         `form="{{ form_id }}"` so existing server-side validation +
         redirects keep working. #}
      <div class="fe-save-bar fe-modal-save-bar" data-meeting-save-bar hidden
           data-fe-skip-save-bar>
        <span class="fe-save-bar-msg">Unsaved changes</span>
        <button type="submit" form="{{ form_id }}" class="btn fe-save-bar-btn">{{ submit_label }}</button>
      </div>
    </div>
  </div>
</div>

{# Markdown live-preview for the Description field. `marked` is vendored
   under app/static/js/vendor/ and only loaded when this modal renders.
   The handler walks every `[data-md-editor]` block (currently only the
   description, but the same wiring works for additional Markdown
   fields if we add more) and re-renders the preview on input. #}
<script src="{{ url_for('static', filename='js/vendor/marked.min.js') }}"></script>
<script>
(function () {
  if (typeof marked === 'undefined') return;
  marked.setOptions({ breaks: true, gfm: true });
  document.querySelectorAll('[data-md-editor]').forEach(function (wrap) {
    var ta = wrap.querySelector('[data-md-input]');
    var preview = wrap.querySelector('[data-md-preview]');
    if (!ta || !preview) return;
    function render() {
      var v = ta.value || '';
      if (!v.trim()) {
        preview.innerHTML = '<span class="md-editor-preview-empty muted small">Preview appears here as you type.</span>';
        return;
      }
      preview.innerHTML = marked.parse(v);
    }
    ta.addEventListener('input', render);
    render();
  });
})();
</script>

{# Per-modal yellow save bar — show when the form has any unsaved
   change. Listens for `input` / `change` events on the form, plus a
   MutationObserver for dynamically-added fields (Add tip / Add block
   / etc.). Native form submission still happens via the bar's
   `<button type="submit" form="…">` so server-side redirect-after-
   POST keeps working. The bar's wrapper carries `data-fe-skip-save-
   bar` so the global feSaveBar IIFE doesn't double-track it. #}
<script>
(function () {
  document.querySelectorAll('[data-meeting-form]').forEach(function (form) {
    var modal = form.closest('.modal');
    if (!modal) return;
    var bar = modal.querySelector('[data-meeting-save-bar]');
    if (!bar) return;
    var msg = bar.querySelector('.fe-save-bar-msg');
    var saveBtn = bar.querySelector('.fe-save-bar-btn');
    var dirty = false;

    function show() {
      if (dirty) return;
      dirty = true;
      bar.hidden = false;
      bar.classList.remove('is-leaving');
      if (msg) msg.textContent = 'Unsaved changes';
      if (saveBtn) saveBtn.disabled = false;
    }
    function hide() {
      bar.hidden = true;
      bar.classList.remove('is-leaving');
      if (msg) msg.textContent = 'Unsaved changes';
      if (saveBtn) saveBtn.disabled = false;
      dirty = false;
    }

    form.addEventListener('input', show);
    form.addEventListener('change', show);

    if (window.MutationObserver) {
      var mo = new MutationObserver(function (records) {
        for (var i = 0; i < records.length; i++) {
          var r = records[i];
          var nodes = r.addedNodes.length ? r.addedNodes : r.removedNodes;
          for (var j = 0; j < nodes.length; j++) {
            var n = nodes[j];
            if (n.nodeType === 1 && (
                (n.matches && n.matches('input, select, textarea')) ||
                (n.querySelector && n.querySelector('input, select, textarea')))) {
              show();
              return;
            }
          }
        }
      });
      mo.observe(form, { childList: true, subtree: true });
    }

    // Intercept the native submit and POST via fetch so the modal stays
    // open after a successful save (native form POST would follow the
    // server's redirect away from this page). The server still validates
    // and writes through the same route — we just don't navigate after.
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      if (!dirty) return;
      if (msg) msg.textContent = 'Saving…';
      if (saveBtn) saveBtn.disabled = true;
      var fd = new FormData(form);
      fetch(form.action, {
        method: 'POST',
        credentials: 'same-origin',
        body: fd,
      }).then(function (r) {
        if (!r.ok && (r.status < 200 || r.status >= 400)) {
          throw new Error('save failed: ' + r.status);
        }
        if (msg) msg.textContent = 'Saved';
        // Mark the modal so closing it reloads the host page — the
        // page behind still shows pre-save data until then.
        modal.dataset.reloadOnClose = '1';
        // Drop the bar back down with the same fe-save-leave keyframe
        // the global save bar uses, then reset state so the next edit
        // re-shows it as a fresh "Unsaved changes" pill.
        var done = false;
        var finish = function () {
          if (done) return;
          done = true;
          hide();
        };
        bar.addEventListener('animationend', finish, { once: true });
        bar.classList.add('is-leaving');
        // Safety net for reduced-motion / animation skipped by browser.
        setTimeout(finish, 400);
      }).catch(function () {
        if (msg) msg.textContent = 'Save failed — try again';
        if (saveBtn) saveBtn.disabled = false;
      });
    });

    // "Queue schedule change" submit — intercepted so the modal stays
    // open and the save bar handles the success animation (same UX as
    // the main edit form's inline save). The form lives outside the
    // main edit form (it's the hidden host form rendered after the
    // main </form>); its inputs are scattered up under the schedule
    // grid and tied to it via the HTML5 ``form="…"`` attribute, which
    // FormData() automatically follows. On success we mark the modal
    // to reload its host page when closed, so the pending change row
    // is visible the next time the operator opens this meeting.
    var schedChgForm = modal.querySelector('form[id^="meeting-sched-chg-new-"]');
    if (schedChgForm) {
      schedChgForm.addEventListener('submit', function (e) {
        e.preventDefault();
        if (msg) msg.textContent = 'Saving…';
        if (saveBtn) saveBtn.disabled = true;
        bar.hidden = false;
        bar.classList.remove('is-leaving');
        var fd = new FormData(schedChgForm);
        fetch(schedChgForm.action, {
          method: 'POST',
          credentials: 'same-origin',
          body: fd,
        }).then(function (r) {
          if (!r.ok) throw new Error('save failed: ' + r.status);
          if (msg) msg.textContent = 'Saved';
          modal.dataset.reloadOnClose = '1';
          // Animate the bar out using the same is-leaving keyframe the
          // main form uses, then reset state so a follow-up edit on
          // the main form re-shows the bar fresh.
          var done = false;
          var finish = function () {
            if (done) return;
            done = true;
            hide();
          };
          bar.addEventListener('animationend', finish, { once: true });
          bar.classList.add('is-leaving');
          setTimeout(finish, 400);
          // Clear the queue-change form fields + collapse the
          // details so the next interaction starts fresh. Bound
          // inputs live outside the form DOM, so reset() doesn't
          // touch them — walk them manually via the form attribute.
          modal.querySelectorAll('[form="' + schedChgForm.id + '"]').forEach(function (inp) {
            if (inp.tagName !== 'INPUT' && inp.tagName !== 'SELECT' && inp.tagName !== 'TEXTAREA') return;
            if (inp.type === 'checkbox' || inp.type === 'radio') {
              inp.checked = false;
            } else if (inp.type !== 'submit' && inp.type !== 'button' && inp.type !== 'hidden') {
              inp.value = '';
            }
          });
          modal.querySelectorAll('.day-list-change .day-toggle').forEach(function (t) {
            if (t.checked) {
              t.checked = false;
              t.dispatchEvent(new Event('change'));
            }
          });
          var details = modal.querySelector('details.schedule-change-add');
          if (details) details.open = false;
        }).catch(function () {
          if (msg) msg.textContent = 'Save failed — try again';
          if (saveBtn) saveBtn.disabled = false;
        });
      });
    }

    // When the modal is closed after a successful save, reload the page
    // so the host view reflects the saved edits. The global close
    // handler in app.js flips `aria-hidden` to "true" — observe that
    // and reload when our save flag is set.
    if (window.MutationObserver) {
      var closeObs = new MutationObserver(function () {
        if (modal.getAttribute('aria-hidden') === 'true'
            && modal.dataset.reloadOnClose === '1') {
          // Clear first in case reload is intercepted (e.g. beforeunload).
          delete modal.dataset.reloadOnClose;
          window.location.reload();
        }
      });
      closeObs.observe(modal, { attributes: true, attributeFilter: ['aria-hidden'] });
    }
  });
})();
</script>

{# Extended-content editor — toggle gates editor visibility, add/
   remove cards work by cloning a hidden <template> with __INDEX__
   placeholders. Submission keeps cards in document order via
   `ext_block_present` markers. #}
<script>
(function () {
  document.querySelectorAll('[data-extended-toggle]').forEach(function (toggle) {
    var fieldset = toggle.closest('fieldset');
    var editor = fieldset && fieldset.querySelector('[data-extended-editor]');
    if (!editor) return;
    function sync() {
      editor.style.display = toggle.checked ? '' : 'none';
      editor.setAttribute('aria-hidden', toggle.checked ? 'false' : 'true');
    }
    toggle.addEventListener('change', sync);
    sync();
  });

  // Video-conferencing platform toggles — when off, collapse the fields so
  // the fieldset shrinks to just its toggle row. Inputs stay in the DOM so
  // their values are still submitted (disabling keeps the details for an
  // easy re-enable; display is gated server-side by the *_enabled flags).
  document.querySelectorAll('[data-conf-toggle]').forEach(function (toggle) {
    var fieldset = toggle.closest('fieldset');
    var fields = fieldset && fieldset.querySelector('[data-conf-fields]');
    if (!fields) return;
    function sync() {
      fields.style.display = toggle.checked ? '' : 'none';
      fields.setAttribute('aria-hidden', toggle.checked ? 'false' : 'true');
      fieldset.classList.toggle('conf-off', !toggle.checked);
    }
    toggle.addEventListener('change', sync);
    sync();
  });

  // Public-alert expiration toggle — reveals the datetime field when
  // checked. When the toggle is off, the field is hidden AND its
  // current value is cleared so an accidental toggle-off-toggle-on
  // doesn't carry a stale expiry forward into the save.
  document.querySelectorAll('[data-public-alert-expiry-toggle]').forEach(function (toggle) {
    var wrap = toggle.closest('[data-public-alert-expiry]');
    var field = wrap && wrap.querySelector('[data-public-alert-expiry-field]');
    var input = wrap && wrap.querySelector('[data-public-alert-expiry-input]');
    if (!field) return;
    function sync() {
      field.hidden = !toggle.checked;
      if (toggle.checked && input && !input.value) {
        // Default to 7 days out so the admin has a sensible starting
        // point — they can adjust before saving. Site-local "now" is
        // approximated from the browser clock; close enough for a
        // default, and the admin can pick whatever they want.
        var d = new Date();
        d.setDate(d.getDate() + 7);
        var pad = function (n) { return (n < 10 ? '0' : '') + n; };
        input.value = d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' +
                      pad(d.getDate()) + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
      }
    }
    toggle.addEventListener('change', sync);
    sync();
  });

  document.querySelectorAll('[data-extended-editor]').forEach(function (editor) {
    var list = editor.querySelector('[data-extended-list]');
    var tpl = editor.querySelector('[data-extended-template]');
    var addBtn = editor.querySelector('[data-extended-add]');
    if (!list || !tpl || !addBtn) return;

    var nextIdx = 0;
    list.querySelectorAll('[data-extended-item]').forEach(function (card) {
      var i = parseInt(card.dataset.itemIndex, 10);
      if (Number.isFinite(i) && i >= nextIdx) nextIdx = i + 1;
    });

    list.addEventListener('click', function (e) {
      var btn = e.target.closest('[data-extended-remove]');
      if (!btn) return;
      var card = btn.closest('[data-extended-item]');
      if (card) card.remove();
    });

    addBtn.addEventListener('click', function () {
      var idx = nextIdx++;
      var html = tpl.innerHTML.replace(/__INDEX__/g, String(idx));
      var wrap = document.createElement('div');
      wrap.innerHTML = html.trim();
      var card = wrap.firstElementChild;
      list.appendChild(card);
      var titleInput = card.querySelector('input[type="text"]');
      if (titleInput) titleInput.focus();
    });
  });
})();
</script>
