{# Magazine layout — featured hero + 3-up grid below.
   Body extracted to `_magazine_body.html`. #}
<section class="fe-section fe-events fe-events-list-magazine fe-events-list--w-{{ list_width_mode }}" id="events">
  <div class="{% if list_width_mode == 'boxed' %}fe-container{% else %}fe-mlist-fullwrap{% endif %}"
       {% if list_width_mode == 'boxed' %}style="max-width: {{ list_max_width }}px;"
       {%- elif list_padding_pct %}style="padding-left: {{ list_padding_pct }}vw; padding-right: {{ list_padding_pct }}vw;"{% endif %}>
    <header class="fe-mlist-head">
      <h1>{{ list_heading or 'Upcoming events' }}</h1>
      <p class="muted">{{ list_subheading or 'The next event up top — everything else in chronological order below.' }}</p>
    </header>
    {% include "frontend/events_list/_magazine_body.html" %}
  </div>
</section>
